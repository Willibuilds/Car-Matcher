<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Car Matcher – Find Your Perfect Car</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      background: linear-gradient(180deg, #fafafa, #e5e5ea);
      color: #1d1d1f;
    }

    header {
      padding: 18px 32px;
      font-weight: 700;
      letter-spacing: 0.06em;
      font-size: 14px;
      text-transform: uppercase;
    }

    .hero {
      text-align: center;
      padding: 40px 16px 20px;
    }

    h1 {
      font-size: 44px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #6e6e73;
      margin-bottom: 40px;
    }

    /* 3-column layout */
    .layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 32px;
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    /* Card styling */
    .card, .result-card, .link-card {
      background: #ffffff;
      width: 380px;
      padding: 26px 24px 24px;
      border-radius: 22px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.08);
      animation: fadeIn 0.7s ease forwards;
      opacity: 0;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid #d2d2d7;
      font-size: 15px;
      background: #f9f9fb;
      transition: 0.15s;
    }

    input:focus, select:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.18);
      background: #ffffff;
    }

    button {
      margin-top: 22px;
      width: 100%;
      padding: 13px;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.18s;
      box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    }

    button:hover { background: #1c1c1e; }
    button:disabled { opacity: 0.6; cursor: default; }

    /* Link box */
    .link-card {
      text-align: left;
    }

    #car-link {
      font-size: 16px;
      margin-top: 10px;
      display: none;
    }

    #car-link a {
      color: #0071e3;
      font-weight: 600;
      text-decoration: none;
    }

    #car-link a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <header>CAR MATCHER</header>

  <main class="hero">
    <h1>Find your perfect car.</h1>
    <p class="subtitle">Answer a few quick questions and get a personalised recommendation in seconds.</p>

    <div class="layout">

      <!-- Preferences -->
      <section class="card">
        <h2>Your preferences</h2>

        <label for="budget">Budget (£)</label>
        <input type="number" id="budget" placeholder="e.g. 15000" />

        <label for="use">Primary use</label>
        <select id="use">
          <option value="">Select an option</option>
          <option>Daily commuting</option>
          <option>Long distance</option>
          <option>Family and practicality</option>
          <option>City driving</option>
          <option>Performance and fun</option>
        </select>

        <label for="fuel">Fuel preference</label>
        <select id="fuel">
          <option value="">Select an option</option>
          <option>Petrol</option>
          <option>Diesel</option>
          <option>Hybrid</option>
          <option>Electric</option>
          <option>No strong preference</option>
        </select>

        <button id="find">Find My Car</button>
      </section>

      <!-- Recommendation -->
      <section class="result-card">
        <h3>Recommendation</h3>
        <div id="result">Your ideal car will appear here.</div>
      </section>

      <!-- Car Link -->
      <section class="link-card">
        <h3>Car Link</h3>
        <div id="car-link"></div>
      </section>

    </div>
  </main>

  <script>
    const btn = document.getElementById("find");
    const resultBox = document.getElementById("result");
    const linkBox = document.getElementById("car-link");

    btn.addEventListener("click", async () => {
      const budget = document.getElementById("budget").value.trim();
      const use = document.getElementById("use").value;
      const fuel = document.getElementById("fuel").value;

      if (!budget || !use || !fuel) {
        resultBox.textContent = "Please fill in all fields.";
        return;
      }

      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = "Thinking...";
      resultBox.textContent = "Generating your recommendation…";
      linkBox.style.display = "none";

      try {
        const response = await fetch("/api/car", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ budget, use, fuel })
        });

        const data = await response.json();

        if (response.ok) {
          let carName = data.recommendation;

          // Extract car model using multiple patterns
          let match =
            carName.match(/recommend(?: the)? ([A-Za-z0-9 .\-]+)/i) ||
            carName.match(/would recommend(?: the)? ([A-Za-z0-9 .\-]+)/i) ||
            carName.match(/suggest(?: the)? ([A-Za-z0-9 .\-]+)/i) ||
            carName.match(/best option is(?: the)? ([A-Za-z0-9 .\-]+)/i);

          if (match && match[1]) {
            carName = match[1].trim();
          } else {
            carName = carName.split("\n")[0].trim();
          }

          // Bold the car name
          const formatted = `<strong>${carName}</strong><br><br>${data.recommendation}`;
          resultBox.innerHTML = formatted;

          // Create link
          const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(carName + " car")}`;

          linkBox.innerHTML = `
            <p>Find this car online:</p>
            <a href="${searchUrl}" target="_blank">Search for ${carName}</a>
          `;

          linkBox.style.display = "block";

        } else {
          resultBox.textContent = data.error || "Something went wrong.";
        }
      } catch (err) {
        resultBox.textContent = "Could not reach the server.";
      }

      btn.disabled = false;
      btn.textContent = original;
    });
  </script>

</body>
</html>
