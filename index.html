<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Matcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .container {
            max-width: 700px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0071e3;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0a84ff;
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="hero">
  <h1>Find Your Perfect Car</h1>
  <p class="subtitle">Smart, fast and personalised recommendations powered by AI.</p>

  <div class="card">
    <h2>Your Preferences</h2>

    <label>Budget (£)</label>
    <input type="number" id="budget">

    <label>Primary Use</label>
    <select id="use">
      <option>Daily commuting</option>
      <option>Long distance</option>
      <option>Family</option>
      <option>Performance</option>
    </select>

    <label>Fuel Preference</label>
    <select id="fuel">
      <option>Petrol</option>
      <option>Diesel</option>
      <option>Hybrid</option>
      <option>Electric</option>
    </select>

    <button id="find">Find My Car</button>

    <div id="result"></div>
  </div>
</div>


    <script>
        document.getElementById("carForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                budget: document.getElementById("budget").value,
                use: document.getElementById("use").value,
                fuel: document.getElementById("fuel").value
            };

            const response = await fetch("/api/car", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const box = document.getElementById("result");
            box.style.display = "block";
            box.innerText = result.recommendation;
        });
    </script>

</body>
</html>
